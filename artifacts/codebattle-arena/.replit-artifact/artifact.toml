kind = "web"
previewPath = "/"
title = "CodeBattle Arena"
version = "1.0.0"
id = "artifacts/codebattle-arena"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18630

[services.development]
run = "pnpm --filter @workspace/codebattle-arena run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/codebattle-arena", "run", "build" ]
publicDir = "artifacts/codebattle-arena/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18630"
BASE_PATH = "/"
